name: Lockfile Integrity

# Phase 3: Supply Chain Security - Layer 6
# Verify package-lock.json integrity to prevent supply chain attacks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

jobs:
  verify-lockfile:
    name: Verify Lockfile Integrity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
        
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          
      - name: Check if package.json changed without lockfile
        run: |
          echo "🔐 Verifying lockfile integrity..."
          
          # Only dependency block changes require a lockfile update. Script-only
          # package.json edits do not change the dependency graph.
          PACKAGE_CHANGED=0
          if git diff --name-only HEAD~1 HEAD | grep -q "package.json"; then
            BEFORE=$(git show HEAD~1:package.json | jq -c '{dependencies, devDependencies, optionalDependencies, peerDependencies}')
            AFTER=$(jq -c '{dependencies, devDependencies, optionalDependencies, peerDependencies}' package.json)
            if [ "$BEFORE" != "$AFTER" ]; then
              PACKAGE_CHANGED=1
            fi
          fi
          LOCKFILE_CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -c "package-lock.json" || true)
          
          if [ "$PACKAGE_CHANGED" -gt 0 ] && [ "$LOCKFILE_CHANGED" -eq 0 ]; then
            echo "❌ package.json dependency blocks changed without package-lock.json"
            echo "Please run 'npm install' and commit the updated package-lock.json"
            exit 1
          fi
          
          if [ "$LOCKFILE_CHANGED" -gt 0 ] && [ "$PACKAGE_CHANGED" -eq 0 ]; then
            echo "⚠️  package-lock.json changed without package.json - please verify this is intentional"
          fi
          
          echo "✅ Lockfile integrity verified"
          
      - name: Verify lockfile is up to date
        run: |
          echo "🔍 Verifying lockfile is up to date..."
          
          npm ci
          
          echo "✅ Lockfile is up to date"
          
      - name: Check for suspicious packages
        run: |
          echo "🛡️ Scanning for known malicious packages..."
          
          # Extract all package names from package.json
          PACKAGES=$(cat package.json | grep '"' | grep ':' | cut -d'"' -f2 | grep -v "^@" | head -50)
          
          echo "Checking packages for known malicious patterns..."
          
          # Basic check for suspicious package names (typosquatting patterns)
          SUSPICIOUS=0
          KNOWN_BAD="crossenv|electron-native-notify|fabric-js|ffmpeg-windows"
          
          for pkg in $PACKAGES; do
            if echo "$pkg" | grep -qE "$KNOWN_BAD"; then
              echo "⚠️  Suspicious package detected: $pkg"
              SUSPICIOUS=$((SUSPICIOUS + 1))
            fi
          done
          
          if [ $SUSPICIOUS -gt 0 ]; then
            echo "❌ Found $SUSPICIOUS suspicious package(s)"
            exit 1
          fi
          
          echo "✅ No known malicious packages detected"
