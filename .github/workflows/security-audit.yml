name: Security Audit

# Phase 3: Supply Chain Security - Layer 6
# Automated npm audit and vulnerability scanning on every push/PR

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run npm audit (moderate and above)
        run: |
          echo "🔍 Running npm audit for moderate, high, and critical vulnerabilities..."
          npm audit --audit-level=moderate
        continue-on-error: false
        
      - name: Generate audit report
        if: always()
        run: |
          echo "📊 Generating detailed audit report..."
          npm audit --json > audit-report.json
          
      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: npm-audit-report
          path: audit-report.json
          retention-days: 30
          
      - name: Check for critical vulnerabilities
        run: |
          echo "🚨 Checking for critical vulnerabilities..."
          CRITICAL_COUNT=$(npm audit --json | jq '.metadata.vulnerabilities.critical // 0')
          HIGH_COUNT=$(npm audit --json | jq '.metadata.vulnerabilities.high // 0')
          
          echo "Critical vulnerabilities: $CRITICAL_COUNT"
          echo "High vulnerabilities: $HIGH_COUNT"
          
          if [ "$CRITICAL_COUNT" -gt 0 ]; then
            echo "❌ FAILED: Found $CRITICAL_COUNT critical vulnerabilities"
            exit 1
          fi
          
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "⚠️  WARNING: Found $HIGH_COUNT high vulnerabilities"
          fi
          
          echo "✅ No critical vulnerabilities found"

  outdated-check:
    name: Check Outdated Dependencies
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Check for outdated packages
        run: |
          echo "📦 Checking for outdated packages..."
          npm outdated || true
          
      - name: Generate outdated report
        run: |
          npm outdated --json > outdated-report.json || true
          
      - name: Upload outdated report
        uses: actions/upload-artifact@v7
        with:
          name: outdated-packages-report
          path: outdated-report.json
          retention-days: 30
