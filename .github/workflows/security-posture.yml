name: Security Posture Check

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run weekly on Monday at 9am UTC
    - cron: '0 9 * * 1'

jobs:
  security-headers:
    name: Check Security Headers
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Security Headers (Production)
        run: |
          echo "🔍 Checking security headers for production deployment..."
          
          # Check if app is deployed (using Lovable preview URL pattern)
          PREVIEW_URL="https://lovable.app"
          
          echo "Testing security headers..."
          RESPONSE=$(curl -sI "$PREVIEW_URL" || echo "FAILED")
          
          if [ "$RESPONSE" = "FAILED" ]; then
            echo "⚠️  Could not reach deployment - skipping header checks"
            exit 0
          fi
          
          echo "📋 Response headers:"
          echo "$RESPONSE"
          
          # Check for critical security headers
          echo ""
          echo "🛡️  Security Headers Status:"
          echo "$RESPONSE" | grep -i "Strict-Transport-Security" && echo "✅ HSTS enabled" || echo "❌ HSTS missing"
          echo "$RESPONSE" | grep -i "X-Frame-Options" && echo "✅ X-Frame-Options set" || echo "❌ X-Frame-Options missing"
          echo "$RESPONSE" | grep -i "X-Content-Type-Options" && echo "✅ X-Content-Type-Options set" || echo "❌ X-Content-Type-Options missing"
          echo "$RESPONSE" | grep -i "Content-Security-Policy" && echo "✅ CSP configured" || echo "⚠️  CSP not detected"
          echo "$RESPONSE" | grep -i "Permissions-Policy" && echo "✅ Permissions-Policy set" || echo "⚠️  Permissions-Policy not detected"

      - name: Security Grade Summary
        run: |
          echo ""
          echo "📊 Security Posture Summary"
          echo "============================"
          echo "This check validates the presence of security headers."
          echo "For detailed analysis, visit: https://securityheaders.com"
          echo ""
          echo "💡 Note: This is informational only and does not block deployments."

  lockfile-integrity:
    name: Verify Lockfile Integrity
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need at least 2 commits to detect changes

      - name: Check for package.json changes
        id: check-changes
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "package.json"; then
            echo "package_json_changed=true" >> $GITHUB_OUTPUT
          else
            echo "package_json_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify lockfile updated
        if: steps.check-changes.outputs.package_json_changed == 'true'
        run: |
          if git diff --name-only HEAD^ HEAD | grep -q "bun.lockb"; then
            echo "✅ Lockfile updated with package.json changes"
          else
            echo "❌ ERROR: package.json was modified but bun.lockb was not updated!"
            echo "Please run: bun install"
            exit 1
          fi

      - name: Check for suspicious packages
        run: |
          echo "🔍 Scanning for suspicious package patterns..."
          
          # Check for packages with suspicious names or patterns
          if grep -E "(bitcoin|crypto-miner|malware|backdoor)" package.json; then
            echo "⚠️  WARNING: Potentially suspicious package names detected"
            echo "Please review the flagged packages carefully"
          else
            echo "✅ No obviously suspicious packages detected"
          fi

  dependency-security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run security audit
        run: |
          echo "🔍 Running npm security audit..."
          npm audit --omit=dev || echo "⚠️  Security vulnerabilities found - review above"
          
          echo ""
          echo "💡 Security Audit Complete"
          echo "Review any high or critical vulnerabilities and update dependencies as needed"
