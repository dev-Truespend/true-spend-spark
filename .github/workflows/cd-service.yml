# CD for the API: roll the API Container App to the image ci-service already built + pushed.
# Auto-runs after a successful ci-service (workflow_run) — and because ci-service is
# path-filtered, this only fires when the API actually changed. Also manually dispatchable.
# Does NOT rebuild; ci-service owns build/test/push. Container App secrets/env come from
# Key Vault via Terraform.
name: cd-service
on:
  workflow_run:
    workflows: ["ci-service"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    # Auto path: only when ci-service succeeded. Manual path: always allowed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: prod   # add required reviewers here to gate the prod roll
    env:
      ACR: ${{ secrets.ACR_NAME }}
      # The exact commit ci-service built (auto), or :latest for a manual roll.
      TAG: ${{ github.event.workflow_run.head_sha || 'latest' }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Roll API Container App to the CI-built image
        run: |
          az containerapp update -n ca-truespend-api-prod -g rg-truespend-prod \
            --image "$ACR.azurecr.io/truespend-api:$TAG"
