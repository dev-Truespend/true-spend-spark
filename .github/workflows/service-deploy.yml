# Rolls the prod Container Apps to the image that CI (ci.yml) already built + pushed to ACR.
# Does NOT rebuild — CI owns build/test/push. Auto-runs after a successful CI on master;
# also manually dispatchable. Container App secrets/env are projected from Key Vault by Terraform.
name: service-deploy
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    # Auto path: only when CI succeeded. Manual path: always allowed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: prod   # add required reviewers here to gate the prod roll
    env:
      ACR: ${{ secrets.ACR_NAME }}
      # The exact commit CI built (auto), or the dispatched ref (manual). CI tags images :<sha>.
      TAG: ${{ github.event.workflow_run.head_sha || github.sha }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Roll Container Apps to the CI-built image
        run: |
          az containerapp update -n ca-truespend-api-prod    -g rg-truespend-prod \
            --image "$ACR.azurecr.io/truespend-api:$TAG"
          az containerapp update -n ca-truespend-worker-prod -g rg-truespend-prod \
            --image "$ACR.azurecr.io/truespend-worker:$TAG"
