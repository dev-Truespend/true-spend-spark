# CI: build + unit-test the mobile app and the .NET service, and build & push the
# service images to ACR. Does NOT deploy — rolling the Container Apps is service-deploy.yml
# (which auto-runs on a successful CI). Runs automatically on push to master; also
# manually dispatchable (with a toggle to skip the image push for a test-only run).
name: ci
on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      push_images:
        description: Build & push service images to ACR (uncheck for test-only)
        type: boolean
        default: true

jobs:
  mobile:
    name: mobile (lint + typecheck + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui-mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui-mobile/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  service:
    name: service (build + test + push image)
    runs-on: ubuntu-latest
    env:
      ACR: ${{ secrets.ACR_NAME }}
      TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
      - name: Build & unit test
        run: dotnet test service/TrueSpend.sln -c Release

      - name: Azure login
        if: ${{ github.event_name == 'push' || inputs.push_images }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Build & push images (tagged :<sha> and :latest)
        if: ${{ github.event_name == 'push' || inputs.push_images }}
        run: |
          az acr login --name "$ACR"
          docker build -f docker/truespend.api.Dockerfile --target production \
            -t "$ACR.azurecr.io/truespend-api:$TAG" -t "$ACR.azurecr.io/truespend-api:latest" service
          docker push "$ACR.azurecr.io/truespend-api:$TAG"
          docker push "$ACR.azurecr.io/truespend-api:latest"
          docker build -f docker/truespend.workerservice.Dockerfile --target production \
            -t "$ACR.azurecr.io/truespend-worker:$TAG" -t "$ACR.azurecr.io/truespend-worker:latest" service
          docker push "$ACR.azurecr.io/truespend-worker:$TAG"
          docker push "$ACR.azurecr.io/truespend-worker:latest"
