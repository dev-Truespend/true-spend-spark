# CD for the worker: roll the worker Container App to the image ci-worker already built + pushed.
# Auto-runs after a successful ci-worker (workflow_run) — and because ci-worker is
# path-filtered, this only fires when the worker actually changed. Also manually dispatchable.
# Does NOT rebuild; ci-worker owns build/test/push. Container App secrets/env come from
# Key Vault via Terraform.
name: cd-worker
on:
  workflow_run:
    workflows: ["ci-worker"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
jobs:
  deploy:
    # Auto path: only when ci-worker succeeded. Manual path: always allowed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: prod   # add required reviewers here to gate the prod roll
    env:
      ACR: ${{ secrets.ACR_NAME }}
      # The exact commit ci-worker built (auto), or :latest for a manual roll.
      TAG: ${{ github.event.workflow_run.head_sha || 'latest' }}
    steps:
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Roll worker Container App to the CI-built image
        run: |
          az containerapp update -n ca-truespend-worker-prod -g rg-truespend-prod \
            --image "$ACR.azurecr.io/truespend-worker:$TAG"
      # Single revision mode auto-deactivates the prior revision, but deactivate any
      # other still-active revision defensively so only the live one ever runs (keeps
      # the connection count bounded and the revision list clean). No-op in the normal case.
      - name: Deactivate non-live worker revisions
        run: |
          APP=ca-truespend-worker-prod; RG=rg-truespend-prod
          LIVE=$(az containerapp show -n "$APP" -g "$RG" \
            --query "properties.latestReadyRevisionName" -o tsv)
          echo "Live revision: $LIVE — keeping it running"
          az containerapp revision list -n "$APP" -g "$RG" \
            --query "[?properties.active && name!='$LIVE'].name" -o tsv \
          | while read -r REV; do
              [ -n "$REV" ] || continue
              az containerapp revision deactivate -n "$APP" -g "$RG" --revision "$REV" || true
              echo "  Deactivated: $REV"
            done
