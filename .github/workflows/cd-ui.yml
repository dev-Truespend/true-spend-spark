# CD for the mobile app: EAS build (iOS production) -> submit to TestFlight.
# MANUAL ONLY (workflow_dispatch) — EAS cloud builds consume credits, so this is
# not auto-triggered. ci-ui validates every UI commit; press "Run workflow" here
# when you actually want a TestFlight build. One-time EAS/Apple setup + EAS env
# vars are prerequisites; see deployment-guide §8.
name: cd-ui
on:
  workflow_dispatch:
jobs:
  build-submit:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ui-mobile
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: ui-mobile/package-lock.json
      - run: npm ci
      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}
      - name: Build iOS (production)
        run: eas build --platform ios --profile production --non-interactive --wait
      - name: Submit to TestFlight
        run: eas submit --platform ios --profile production --latest --non-interactive
